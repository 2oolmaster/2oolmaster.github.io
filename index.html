<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">2oolmaster - Elite Multi-Tool Web Suite</title>
    
    <!-- AOS Library CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080c14;
            --bg-gradient: radial-gradient(circle at 50% 0%, #111130 0%, #080c14 75%);
            --card-bg: rgba(13, 18, 30, 0.75);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }
        body {
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 bg-slate-950/60 backdrop-blur-md border-b border-slate-200/10 transition-all">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-cube text-xl"></i>
                </div>
                <span class="text-2xl font-black tracking-wider bg-gradient-to-r from-indigo-500 to-violet-500 bg-clip-text text-transparent">2oolmaster</span>
            </div>
        </div>
    </header>

    <!-- Hero Section with Animation -->
    <section class="max-w-6xl mx-auto px-6 py-20 text-center" data-aos="fade-up">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6">
            The Complete <span class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">Developer Hub</span>
        </h1>
    </section>

    <!-- Tools Grid with Scroll Animations -->
    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-2xl" data-aos="zoom-in" data-aos-delay="100">
                <i class="fa-solid fa-wand-magic-sparkles text-4xl text-indigo-500 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">Generators</h3>
                <p class="text-slate-400">Build your tools with speed.</p>
            </div>
            <div class="glass-card p-8 rounded-2xl" data-aos="zoom-in" data-aos-delay="200">
                <i class="fa-solid fa-calculator text-4xl text-emerald-500 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">Calculators</h3>
                <p class="text-slate-400">Precision math suite.</p>
            </div>
            <div class="glass-card p-8 rounded-2xl" data-aos="zoom-in" data-aos-delay="300">
                <i class="fa-solid fa-code text-4xl text-amber-500 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">Utilities</h3>
                <p class="text-slate-400">Developer toolkit ready.</p>
            </div>
        </div>
    </main>

    <!-- AOS JS Initialization -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 50
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
